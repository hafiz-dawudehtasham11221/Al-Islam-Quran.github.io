<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quran Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0f172a;
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  background: #020617;
  font-size: 24px;
  font-weight: 600;
}

.hero {
  text-align: center;
  padding: 80px 20px;
}

.hero h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

.hero p {
  opacity: 0.8;
}

.btn {
  margin-top: 20px;
  padding: 12px 24px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  color: black;
  font-weight: bold;
}

.section {
  padding: 50px 20px;
  text-align: center;
}

.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  width: 250px;
}

footer {
  text-align: center;
  padding: 20px;
  background: #020617;
  font-size: 14px;
}
</style>
</head>

<body>

<header>📖 Quran Hub</header>

<section class="hero">
  <h1>قرأ وتعلم القرآن</h1>
  <p>Read, Learn, and Reflect on the Quran Anytime</p>
  <button class="btn">Start Reading</button>
</section>

<section class="section">
  <h2>Features</h2>
  <div class="cards">
    <div class="card">
      <h3>📖 Read Quran</h3>
      <p>Access all Surahs easily</p>
    </div>
    <div class="card">
      <h3>🎧 Audio Recitation</h3>
      <p>Listen to beautiful recitations</p>
    </div>
    <div class="card">
      <h3>📚 Learn</h3>
      <p>Understand meanings & tafsir</p>
    </div>
  </div>
</section>

<section class="section">
  <h2>Contact</h2>
  <p>Email: contact@quranhub.com</p>
</section>

<footer>
  © 2026 Quran Hub - All Rights Reserved
</footer>

</body>
</html>
